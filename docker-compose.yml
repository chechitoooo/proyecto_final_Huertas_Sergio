version: "3.9"

services:
  jupyter-spark:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proyecto_final_huertas
    ports:
      - "8890:8888"
      - "4041:4040"
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - PYSPARK_PYTHON=python3
      - SPARK_HOME=/usr/local/spark
    command:
      - jupyter
      - notebook
      - --ip=0.0.0.0
      - --port=8888
      - --no-browser
      - --allow-root
      - --NotebookApp.token=
      - --NotebookApp.password=
      - --NotebookApp.allow_origin=*
